name: 📰 每日新聞爬蟲

on:
  schedule:
    # 台北時間 8:30 = UTC 00:30（台灣 UTC+8 無夏令時間）
    - cron: '30 0 * * *'
  workflow_dispatch:  # 也可手動觸發

jobs:
  crawl-news:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🕷️ 執行新聞爬蟲
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_crawler.py

      - name: 📤 提交歷史記錄
        run: |
          git config user.name "news-crawler-bot"
          git config user.email "bot@news-crawler.local"
          git add -A
          git diff --cached --quiet || git commit -m "📰 每日新聞歷史 $(date +'%Y-%m-%d %H:%M' --utc)"
          git push
