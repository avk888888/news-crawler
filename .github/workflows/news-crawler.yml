name: Daily News Crawler

on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  crawl-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python news_crawler.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - run: |
          git config user.name "news-crawler-bot"
          git config user.email "bot@news-crawler.local"
          git add -A
          git diff --cached --quiet || git commit -m "chore: daily news history"
          git push
